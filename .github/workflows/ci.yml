name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Laravel API ──────────────────────────────────────────
  api:
    name: API (PHP 8.3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fashionshop-api

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, pdo_mysql, mbstring, xml, zip, bcmath
          coverage: pcov # Bật coverage để generate report cho SonarCloud

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: fashionshop-api/vendor
          key: composer-${{ hashFiles('fashionshop-api/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Setup .env & database
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run tests with coverage
        run: php artisan test --stop-on-failure --coverage-clover=coverage.xml

      - name: Upload PHP coverage report
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage
          path: fashionshop-api/coverage.xml
          retention-days: 1

  # ── Admin (React) ─────────────────────────────────────────
  admin:
    name: Admin (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fashionshop-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fashionshop-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Web (React) ───────────────────────────────────────────
  web:
    name: Web (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fashionshop-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fashionshop-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ── SonarCloud ────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [api, admin, web] # Chỉ chạy khi cả 3 job trên pass

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history để SonarCloud phân tích blame & new code

      - name: Download PHP coverage report
        uses: actions/download-artifact@v4
        with:
          name: php-coverage
          path: fashionshop-api

      - name: Install SonarScanner
        run: npm install -g sonarqube-scanner

      - name: Run SonarCloud Scan
        run: sonar-scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
